name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref (keep main runs intact).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --results-directory ./TestResults -- --report-trx

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./TestResults/**/*.trx
          if-no-files-found: warn

  aot-publish:
    name: Native AOT Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      # Native AOT needs a C toolchain + zlib to link the self-contained binary.
      - name: Install AOT toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang zlib1g-dev

      # TreatWarningsAsErrors gates IL trim/AOT analyzer warnings (IL2xxx/IL3050)
      # so AOT-incompatible code fails CI instead of surfacing at runtime.
      - name: Publish (linux-x64, AOT)
        run: >-
          dotnet publish FordConnectToAbrpSync/FordConnectToAbrpSync.csproj
          --configuration Release
          --runtime linux-x64
          -p:TreatWarningsAsErrors=true
          --output ./publish

      - name: Upload native binary
        uses: actions/upload-artifact@v4
        with:
          name: FordConnectToAbrpSync-linux-x64
          path: ./publish/FordConnectToAbrpSync
          if-no-files-found: error
