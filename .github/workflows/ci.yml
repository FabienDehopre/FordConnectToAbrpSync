name: CI

on:
  push:
    branches: 
      - main
  pull_request:
    branches: 
      - main

permissions:
  contents: read
  pull-requests: write # coverage-comment step posts via gh pr comment

# Cancel superseded runs on the same ref (keep main runs intact).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: >
          dotnet test --configuration Release --no-build --results-directory ./TestResults --
          --report-trx
          --coverage
          --coverage-output coverage.xml
          --coverage-output-format cobertura
          --coverage-settings "${{ github.workspace }}/coverage.config"
        env:
          TUNIT_GITHUB_REPORTER_STYLE: collapsible
          
      - name: Generate coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@049f7ec958c672fd31d5cc1cb01622dc8d2e23ab # v5
        id: reportgenerator
        with:
          reports: '**/coverage.xml'
          targetdir: ./CoverageReport
          reporttypes: 'HtmlInline;Cobertura;MarkdownSummaryGithub'
          tag: '${{ github.run_number }}_${{ github.run_id }}'
          customSettings: 'minimumCoverageThresholds:lineCoverage=55'

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-results
          path: ./TestResults/**/*.trx
          if-no-files-found: warn
          
      - name: Upload coverage report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: CoverageReport
          path: ./CoverageReport
          
      - name: Report .NET Coverage
        run: gh pr comment $PR_NUMBER --body-file CoverageReport/SummaryGithub.md
        if: github.event_name == 'pull_request' && steps.reportgenerator.outcome != 'skipped'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}
        
      - name: Publish coverage in build summary
        run: cat CoverageReport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
        if: steps.reportgenerator.outcome != 'skipped'
        

  aot-publish:
    name: Native AOT Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6
        with:
          global-json-file: global.json

      # Native AOT needs a C toolchain + zlib to link the self-contained binary.
      - name: Install AOT toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang zlib1g-dev

      # TreatWarningsAsErrors gates IL trim/AOT analyzer warnings (IL2xxx/IL3050)
      # so AOT-incompatible code fails CI instead of surfacing at runtime.
      - name: Publish (linux-x64, AOT)
        run: >-
          dotnet publish FordConnectToAbrpSync/FordConnectToAbrpSync.csproj
          --configuration Release
          --runtime linux-x64
          -p:TreatWarningsAsErrors=true
          --output ./publish

      - name: Upload native binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: FordConnectToAbrpSync-linux-x64
          path: ./publish/FordConnectToAbrpSync
          if-no-files-found: error
